name: Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish (example: v0.2.105-fork.1)"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  # Keep release dispatches independent from normal main/PR builds so a new
  # push cannot cancel a release after its binaries have started building.
  group: build-${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}-${{ inputs.release_tag || 'snapshot' }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUST_BACKTRACE: "1"
  GROK_RELEASE_REPO: liansishen/grok-build

jobs:
  version:
    name: Resolve version
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_release: ${{ steps.version.outputs.is_release }}
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Resolve build version
        id: version
        shell: bash
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          release_tag="$RELEASE_TAG"
          if [[ -n "$release_tag" ]]; then
            version="$(./scripts/release-version.sh "$release_tag")"
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          else
            official="$(sed -n 's/^version = "\([^"]*\)"/\1/p' crates/codegen/xai-grok-version/Cargo.toml | head -n1)"
            version="${official}-fork.0"
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Build version: $version"

  build:
    name: ${{ matrix.name }}
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64
            os: ubuntu-24.04
            artifact: grok-build-linux-x86_64
            binary: target/release/xai-grok-pager
            release_binary: grok-${{ needs.version.outputs.version }}-linux-x86_64
          - name: Windows x86_64
            os: windows-2022
            artifact: grok-build-windows-x86_64
            binary: target/release/xai-grok-pager.exe
            release_binary: grok-${{ needs.version.outputs.version }}-windows-x86_64

    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    env:
      GROK_VERSION: ${{ needs.version.outputs.version }}

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            build-essential clang cmake libssl-dev pkg-config unzip

      - name: Install Linux protoc
        if: runner.os == 'Linux'
        shell: bash
        run: |
          version="29.3"
          archive="$RUNNER_TEMP/protoc.zip"
          directory="$RUNNER_TEMP/protoc"
          curl --fail --location --silent --show-error \
            "https://github.com/protocolbuffers/protobuf/releases/download/v${version}/protoc-${version}-linux-x86_64.zip" \
            --output "$archive"
          unzip -q "$archive" -d "$directory"
          echo "PROTOC=$directory/bin/protoc" >> "$GITHUB_ENV"

      - name: Install Windows protoc
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "29.3"
          $archive = Join-Path $env:RUNNER_TEMP "protoc.zip"
          $directory = Join-Path $env:RUNNER_TEMP "protoc"
          Invoke-WebRequest `
            -Uri "https://github.com/protocolbuffers/protobuf/releases/download/v$version/protoc-$version-win64.zip" `
            -OutFile $archive
          Expand-Archive -Path $archive -DestinationPath $directory -Force
          "PROTOC=$directory\bin\protoc.exe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install Rust toolchain
        shell: bash
        run: |
          rustup toolchain install 1.92.0 --profile minimal --no-self-update
          rustup default 1.92.0
          rustc --version

      - name: Configure Windows linker
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          "CARGO_TARGET_X86_64_PC_WINDOWS_MSVC_LINKER=rust-lld" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Cache Cargo data
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ runner.os }}-x86_64-release
          cache-on-failure: true

      - name: Build release binary
        shell: bash
        run: cargo build --locked -p xai-grok-pager-bin --release

      - name: Verify binary version
        shell: bash
        run: |
          output="$("${{ matrix.binary }}" --version)"
          echo "$output"
          [[ "$output" == *"$GROK_VERSION"* ]]

      - name: Prepare artifacts
        shell: bash
        run: |
          mkdir -p dist
          cp "${{ matrix.binary }}" "dist/${{ matrix.release_binary }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub Release
    if: needs.version.outputs.is_release == 'true'
    needs:
      - version
      - build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: grok-build-linux-x86_64
          path: release

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: grok-build-windows-x86_64
          path: release

      - name: Reject an existing release tag
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          if gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "Release tag already exists and will not be overwritten: ${RELEASE_TAG}" >&2
            exit 1
          fi

      - name: Generate checksums
        working-directory: release
        run: sha256sum grok-* > SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          target_commitish: ${{ github.sha }}
          name: Grok Build Fork ${{ needs.version.outputs.version }}
          generate_release_notes: true
          prerelease: false
          files: |
            release/grok-${{ needs.version.outputs.version }}-linux-x86_64
            release/grok-${{ needs.version.outputs.version }}-windows-x86_64
            release/SHA256SUMS
